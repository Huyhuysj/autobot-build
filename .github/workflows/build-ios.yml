name: Build iOS Geode Mod
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Geode CLI (v3.11.1)
        run: |
          curl -L -o geode.tar.gz https://github.com/geode-sdk/cli/releases/download/v3.11.1/geode-v3.11.1-macos-arm64.tar.gz
          tar -xzf geode.tar.gz
          BIN_PATH=$(find . -name geode -type f | head -1)
          chmod +x "$BIN_PATH"
          sudo mv "$BIN_PATH" /usr/local/bin/geode
          geode --version
      - name: Build mod
        run: geode build --platform ios
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBot-iOS.geode
          path: build/**/*.geode
